# /etc/nginx/conf.d/polycall.conf
# LibPolycall V2 - nginx Reverse Proxy Configuration
# OBINexus Computing
#
# This configuration proxies HTTP/WebSocket requests to the polycalld daemon
# which listens on a Unix domain socket (zero-trust: no direct TCP exposure).
#
# Prerequisites:
#   - polycalld running with --socket /var/run/polycall/polycalld.sock
#   - TLS certificates provisioned at the paths below
#   - nginx user added to 'polycall' group for socket access

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=polycall_api:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=polycall_ffi:10m rate=50r/s;

# Upstream: polycalld Unix domain socket
upstream polycall_backend {
    server unix:/var/run/polycall/polycalld.sock;
    keepalive 32;
}

server {
    listen 80;
    server_name polycall.local;

    # Redirect HTTP -> HTTPS (zero-trust requires TLS)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name polycall.local;

    # --- TLS Configuration ---
    ssl_certificate     /etc/ssl/certs/polycall.crt;
    ssl_certificate_key /etc/ssl/private/polycall.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- Security Headers ---
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Logging ---
    access_log /var/log/nginx/polycall_access.log;
    error_log  /var/log/nginx/polycall_error.log;

    # --- API Proxy ---
    location /api/ {
        limit_req zone=polycall_api burst=50 nodelay;

        proxy_pass http://polycall_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # WebSocket support (hotwire/streaming)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- FFI Bridge Endpoint ---
    location /ffi/ {
        limit_req zone=polycall_ffi burst=20 nodelay;

        proxy_pass http://polycall_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Microservice Isolation Endpoint ---
    location /micro/ {
        limit_req zone=polycall_api burst=30 nodelay;

        proxy_pass http://polycall_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- Telemetry Endpoint (internal only) ---
    location /telemetry/ {
        # Restrict to localhost and private networks
        allow 127.0.0.1;
        allow ::1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://polycall_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # --- Health Check ---
    location /health {
        proxy_pass http://polycall_backend;
        access_log off;
    }

    # --- Deny everything else ---
    location / {
        return 404;
    }
}
